<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRM | Dashboard</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="dashboard">
    <header class="dash-header">
      <div class="brand">
        <div class="brand-logo">CRM</div>
        <h2>Dashboard</h2>
      </div>
      <div class="header-user">
        <div class="header-avatar" id="headerAvatar"></div>
        <div class="header-meta">
          <span class="header-name" id="userName"></span>
          <span class="header-role" id="userRoleBadge"></span>
        </div>
        <button id="logoutBtn">Logout</button>
      </div>
    </header>

    <nav class="tabs">
      <button class="tab-btn active" data-tab="overview">Overview</button>
      <button class="tab-btn" data-tab="users">Users</button>
    </nav>

    <main class="dash-main">
      <section id="tab-overview" class="tab-panel active">
        <div class="profile-hero">
          <div class="profile-avatar-wrap">
            <div class="profile-avatar" id="profileAvatar"></div>
            <button type="button" class="avatar-edit-btn" id="profileAvatarBtn" title="Change avatar">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
            </button>
            <input type="file" id="profileAvatarFile" accept="image/*" hidden />
          </div>
          <div class="profile-info">
            <h1 id="profileName"></h1>
            <p class="profile-email" id="profileEmail"></p>
            <div class="profile-badges">
              <span class="badge" id="profileRole"></span>
              <span class="badge badge-status" id="profileStatus"></span>
            </div>
            <div class="profile-actions">
              <button type="button" class="btn-ghost" id="profileUploadBtn">Upload photo</button>
              <button type="button" class="btn-ghost btn-ghost-danger" id="profileRemoveBtn" hidden>Remove photo</button>
            </div>
            <p class="profile-msg" id="profileMsg"></p>
          </div>
        </div>

        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-icon stat-icon-blue">@</div>
            <div class="stat-content">
              <span class="stat-label">Email</span>
              <span class="stat-value" id="statEmail">—</span>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon stat-icon-green">#</div>
            <div class="stat-content">
              <span class="stat-label">Phone</span>
              <span class="stat-value" id="statPhone">—</span>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon stat-icon-purple">★</div>
            <div class="stat-content">
              <span class="stat-label">Role</span>
              <span class="stat-value" id="statRole">—</span>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon stat-icon-orange">⏱</div>
            <div class="stat-content">
              <span class="stat-label">Member since</span>
              <span class="stat-value" id="statSince">—</span>
            </div>
          </div>
        </div>

        <div class="card">
          <h3>Account details</h3>
          <div class="details-grid" id="detailsGrid"></div>
        </div>
      </section>

      <section id="tab-users" class="tab-panel">
        <div class="card">
          <div class="card-header">
            <h3>Users</h3>
            <button id="refreshUsers" class="btn-secondary">Refresh</button>
          </div>

          <div class="filters">
            <input type="text" id="userSearch" placeholder="Search by name or email..." />
            <select id="userRole">
              <option value="">All roles</option>
              <option value="admin">Admin</option>
              <option value="sales">Sales</option>
              <option value="user">User</option>
            </select>
          </div>

          <p id="usersMessage" class="message"></p>
          <input type="file" id="userAvatarFile" accept="image/*" hidden />

          <div class="table-wrap">
            <table id="usersTable">
              <thead>
                <tr>
                  <th>User</th>
                  <th>Email</th>
                  <th>Role</th>
                  <th>Phone</th>
                  <th>Active</th>
                  <th>Created</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>

          <p id="usersCount" class="muted"></p>
        </div>
      </section>
    </main>
  </div>

  <script>
    const token = localStorage.getItem('token');
    const user = JSON.parse(localStorage.getItem('user') || 'null');

    if (!token || !user) {
      window.location.href = '/login.html';
    }

    const AVATAR_GRADIENTS = [
      'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
      'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)',
      'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)',
      'linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)',
      'linear-gradient(135deg, #fa709a 0%, #fee140 100%)',
      'linear-gradient(135deg, #30cfd0 0%, #330867 100%)',
      'linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%)',
      'linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%)',
      'linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%)',
      'linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%)',
    ];

    function getInitials(name) {
      if (!name) return '?';
      return String(name)
        .trim()
        .split(/\s+/)
        .filter(Boolean)
        .slice(0, 2)
        .map((s) => s[0].toUpperCase())
        .join('');
    }

    function getAvatarGradient(seed) {
      const s = String(seed || '');
      let hash = 0;
      for (let i = 0; i < s.length; i++) {
        hash = (hash * 31 + s.charCodeAt(i)) >>> 0;
      }
      return AVATAR_GRADIENTS[hash % AVATAR_GRADIENTS.length];
    }

    function renderAvatar(el, u, size) {
      if (!el) return;
      el.classList.add('avatar');
      if (size) el.classList.add(`avatar-${size}`);
      const url = u && u.avatar && u.avatar.url;
      if (url) {
        el.style.background = `url('${url}') center/cover no-repeat`;
        el.textContent = '';
      } else {
        el.style.background = getAvatarGradient(u && (u.email || u.name));
        el.textContent = getInitials(u && u.name);
      }
    }

    function avatarMarkup(u, size = 'sm', extraClass = '') {
      const url = u && u.avatar && u.avatar.url;
      const cls = `avatar avatar-${size}${extraClass ? ' ' + extraClass : ''}`;
      if (url) {
        return `<span class="${cls}" style="background:url('${escapeAttr(url)}') center/cover no-repeat"></span>`;
      }
      const grad = getAvatarGradient(u && (u.email || u.name));
      return `<span class="${cls}" style="background:${grad}">${escapeHtml(getInitials(u && u.name))}</span>`;
    }

    // ---- Header ----
    renderAvatar(document.getElementById('headerAvatar'), user, 'sm');
    document.getElementById('userName').textContent = user.name;
    const headerRole = document.getElementById('userRoleBadge');
    headerRole.textContent = user.role;
    headerRole.className = `header-role badge badge-${user.role}`;

    // ---- Profile hero ----
    renderAvatar(document.getElementById('profileAvatar'), user, 'xl');
    document.getElementById('profileName').textContent = user.name;
    document.getElementById('profileEmail').textContent = user.email;
    const profileRole = document.getElementById('profileRole');
    profileRole.textContent = user.role;
    profileRole.classList.add(`badge-${user.role}`);
    const profileStatus = document.getElementById('profileStatus');
    profileStatus.textContent = user.isActive === false ? 'Inactive' : 'Active';
    profileStatus.classList.add(user.isActive === false ? 'badge-inactive' : 'badge-active');

    // ---- Stats ----
    document.getElementById('statEmail').textContent = user.email || '—';
    document.getElementById('statPhone').textContent = user.phone || '—';
    document.getElementById('statRole').textContent = user.role || '—';
    document.getElementById('statSince').textContent = user.createdAt
      ? new Date(user.createdAt).toLocaleDateString(undefined, {
          year: 'numeric',
          month: 'short',
          day: 'numeric',
        })
      : '—';

    // ---- Details grid ----
    const details = [
      ['User ID', user._id || user.id || '—'],
      ['Full name', user.name],
      ['Email', user.email],
      ['Phone', user.phone || '—'],
      ['Role', user.role],
      ['Status', user.isActive === false ? 'Inactive' : 'Active'],
      ['Last login', user.lastLoginAt ? new Date(user.lastLoginAt).toLocaleString() : '—'],
      ['Created at', user.createdAt ? new Date(user.createdAt).toLocaleString() : '—'],
    ];
    document.getElementById('detailsGrid').innerHTML = details
      .map(
        ([k, v]) => `
        <div class="detail-item">
          <span class="detail-key">${escapeHtml(k)}</span>
          <span class="detail-value">${escapeHtml(String(v))}</span>
        </div>`
      )
      .join('');

    // ---- Profile avatar upload (current user) ----
    const profileAvatarEl = document.getElementById('profileAvatar');
    const profileFileInput = document.getElementById('profileAvatarFile');
    const profileUploadBtn = document.getElementById('profileUploadBtn');
    const profileAvatarBtn = document.getElementById('profileAvatarBtn');
    const profileRemoveBtn = document.getElementById('profileRemoveBtn');
    const profileMsg = document.getElementById('profileMsg');

    function setProfileMsg(text, isError) {
      profileMsg.textContent = text || '';
      profileMsg.className = 'profile-msg' + (text ? (isError ? ' error' : ' success') : '');
    }

    function syncRemoveBtn(u) {
      profileRemoveBtn.hidden = !(u && u.avatar && u.avatar.url);
    }
    syncRemoveBtn(user);

    profileUploadBtn.addEventListener('click', () => profileFileInput.click());
    profileAvatarBtn.addEventListener('click', () => profileFileInput.click());
    profileAvatarEl.addEventListener('click', () => profileFileInput.click());

    profileFileInput.addEventListener('change', async () => {
      const file = profileFileInput.files && profileFileInput.files[0];
      if (!file) return;
      if (!file.type.startsWith('image/')) {
        setProfileMsg('Please choose an image file.', true);
        return;
      }
      if (file.size > 5 * 1024 * 1024) {
        setProfileMsg('Image is too large (max 5MB).', true);
        return;
      }

      profileUploadBtn.disabled = true;
      setProfileMsg('Uploading...');

      const fd = new FormData();
      fd.append('avatar', file);
      try {
        const res = await fetch('/api/v1/auth/me/avatar', {
          method: 'POST',
          headers: { Authorization: `Bearer ${token}` },
          body: fd,
        });
        const json = await res.json();
        if (!res.ok || !json.success) throw new Error(json.message || 'Upload failed');

        const updated = json.data;
        Object.assign(user, updated);
        localStorage.setItem('user', JSON.stringify(user));
        renderAvatar(profileAvatarEl, user, 'xl');
        renderAvatar(document.getElementById('headerAvatar'), user, 'sm');
        syncRemoveBtn(user);
        setProfileMsg('Photo updated.');
      } catch (err) {
        setProfileMsg(err.message, true);
      } finally {
        profileUploadBtn.disabled = false;
        profileFileInput.value = '';
      }
    });

    profileRemoveBtn.addEventListener('click', async () => {
      if (!confirm('Remove your profile photo?')) return;
      profileRemoveBtn.disabled = true;
      setProfileMsg('Removing...');
      try {
        const res = await fetch('/api/v1/auth/me/avatar', {
          method: 'DELETE',
          headers: { Authorization: `Bearer ${token}` },
        });
        const json = await res.json();
        if (!res.ok || !json.success) throw new Error(json.message || 'Failed to remove');

        user.avatar = undefined;
        localStorage.setItem('user', JSON.stringify(user));
        renderAvatar(profileAvatarEl, user, 'xl');
        renderAvatar(document.getElementById('headerAvatar'), user, 'sm');
        syncRemoveBtn(user);
        setProfileMsg('Photo removed.');
      } catch (err) {
        setProfileMsg(err.message, true);
      } finally {
        profileRemoveBtn.disabled = false;
      }
    });

    // ---- Logout ----
    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      window.location.href = '/login.html';
    });

    // ---- Tabs ----
    const tabs = document.querySelectorAll('.tab-btn');
    const panels = document.querySelectorAll('.tab-panel');
    tabs.forEach((btn) => {
      btn.addEventListener('click', () => {
        tabs.forEach((b) => b.classList.remove('active'));
        panels.forEach((p) => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
        if (btn.dataset.tab === 'users') loadUsers();
      });
    });

    // ---- Users tab ----
    const usersMsg = document.getElementById('usersMessage');
    const usersBody = document.querySelector('#usersTable tbody');
    const usersCount = document.getElementById('usersCount');

    async function loadUsers() {
      usersMsg.textContent = 'Loading...';
      usersMsg.className = 'message';
      usersBody.innerHTML = '';

      const params = new URLSearchParams();
      const search = document.getElementById('userSearch').value.trim();
      const role = document.getElementById('userRole').value;
      if (search) params.append('search', search);
      if (role) params.append('role', role);
      params.append('limit', '50');

      try {
        const res = await fetch(`/api/v1/users?${params.toString()}`, {
          headers: { Authorization: `Bearer ${token}` },
        });
        const json = await res.json();

        if (res.status === 401) {
          localStorage.clear();
          window.location.href = '/login.html';
          return;
        }
        if (res.status === 403) {
          throw new Error('Only admins can view users');
        }
        if (!res.ok || !json.success) {
          throw new Error(json.message || 'Failed to load users');
        }

        const items = json.items || [];
        if (!items.length) {
          usersMsg.textContent = 'No users found.';
          usersCount.textContent = '';
          return;
        }

        usersMsg.textContent = '';
        usersBody.innerHTML = items
          .map(
            (u) => `
          <tr>
            <td>
              <div class="user-cell">
                <button type="button" class="avatar-trigger" data-user-id="${escapeAttr(u._id || u.id)}" title="Change photo">
                  ${avatarMarkup(u, 'sm', 'avatar-clickable')}
                  <span class="avatar-trigger-overlay">
                    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                  </span>
                </button>
                <span class="user-cell-name">${escapeHtml(u.name)}</span>
              </div>
            </td>
            <td>${escapeHtml(u.email)}</td>
            <td><span class="badge badge-${u.role}">${u.role}</span></td>
            <td>${escapeHtml(u.phone || '-')}</td>
            <td>
              <span class="dot ${u.isActive ? 'dot-on' : 'dot-off'}"></span>
              ${u.isActive ? 'Yes' : 'No'}
            </td>
            <td>${new Date(u.createdAt).toLocaleDateString()}</td>
          </tr>`
          )
          .join('');

        const p = json.pagination || {};
        usersCount.textContent = `Showing ${items.length} of ${p.total ?? items.length}`;
      } catch (err) {
        usersMsg.textContent = err.message;
        usersMsg.classList.add('error');
        usersCount.textContent = '';
      }
    }

    document.getElementById('refreshUsers').addEventListener('click', loadUsers);

    // ---- Upload avatar from users table ----
    let pendingUserId = null;
    const userFileInput = document.getElementById('userAvatarFile');

    usersBody.addEventListener('click', (e) => {
      const trigger = e.target.closest('.avatar-trigger');
      if (!trigger) return;
      pendingUserId = trigger.dataset.userId;
      userFileInput.click();
    });

    userFileInput.addEventListener('change', async () => {
      const file = userFileInput.files && userFileInput.files[0];
      const id = pendingUserId;
      pendingUserId = null;
      userFileInput.value = '';
      if (!file || !id) return;

      if (!file.type.startsWith('image/')) {
        usersMsg.textContent = 'Please choose an image file.';
        usersMsg.className = 'message error';
        return;
      }
      if (file.size > 5 * 1024 * 1024) {
        usersMsg.textContent = 'Image is too large (max 5MB).';
        usersMsg.className = 'message error';
        return;
      }

      usersMsg.textContent = 'Uploading photo...';
      usersMsg.className = 'message';

      const fd = new FormData();
      fd.append('avatar', file);
      try {
        const res = await fetch(`/api/v1/users/${encodeURIComponent(id)}/avatar`, {
          method: 'POST',
          headers: { Authorization: `Bearer ${token}` },
          body: fd,
        });
        const json = await res.json();
        if (!res.ok || !json.success) throw new Error(json.message || 'Upload failed');

        if (String(user._id || user.id) === String(id)) {
          Object.assign(user, json.data);
          localStorage.setItem('user', JSON.stringify(user));
          renderAvatar(profileAvatarEl, user, 'xl');
          renderAvatar(document.getElementById('headerAvatar'), user, 'sm');
          syncRemoveBtn(user);
        }

        usersMsg.textContent = 'Photo updated.';
        usersMsg.className = 'message success';
        loadUsers();
      } catch (err) {
        usersMsg.textContent = err.message;
        usersMsg.className = 'message error';
      }
    });

    let searchTimer;
    document.getElementById('userSearch').addEventListener('input', () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(loadUsers, 300);
    });
    document.getElementById('userRole').addEventListener('change', loadUsers);

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function escapeAttr(str) {
      return escapeHtml(str);
    }
  </script>
</body>
</html>
